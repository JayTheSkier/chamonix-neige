<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#d6e4f0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Mountain silhouette -->
  <polygon points="256,120 380,310 420,280 480,380 32,380 100,280 140,310" fill="url(#mountain)" opacity="0.9"/>
  <!-- Snow cap accent -->
  <polygon points="256,120 290,180 222,180" fill="#5ba4e6" opacity="0.8"/>
  <polygon points="100,280 140,310 120,310" fill="#5ba4e6" opacity="0.5"/>
  <polygon points="420,280 460,330 400,330" fill="#5ba4e6" opacity="0.5"/>
  <!-- Snowflake -->
  <g transform="translate(256, 440)" fill="#5ba4e6" opacity="0.7">
    <circle cx="0" cy="0" r="6"/>
    <rect x="-2" y="-20" width="4" height="40" rx="2"/>
    <rect x="-2" y="-20" width="4" height="40" rx="2" transform="rotate(60)"/>
    <rect x="-2" y="-20" width="4" height="40" rx="2" transform="rotate(120)"/>
  </g>
</svg>
